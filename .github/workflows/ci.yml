name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  # Added incrementally (design: docs/ci.md):
  #  - eBPF: privileged ubuntu runner + kernel-version matrix + CAP_BPF E2E
  #  - security: cargo-audit / cargo-deny (dependency vulns / licenses)
  #  - platform: egress proxy + tool gate on macOS/Windows (no eBPF)
  #  - release: SLSA provenance (at first release)
