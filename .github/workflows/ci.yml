name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      # default-members only (pasu-core, pasu-rig). The eBPF stack needs nightly +
      # bpf-linker + a Linux/bpf target, so it is built and E2E-tested on Linux in
      # a separate (privileged) job — see the ci.md plan below.
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test

  ebpf:
    name: eBPF build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: install bpf-linker
        run: cargo install bpf-linker --locked
      - uses: Swatinem/rust-cache@v2
      - name: build eBPF stack
        run: cargo build -p pasu-egress

  # Added incrementally (design: docs/ci.md):
  #  - eBPF E2E: privileged runner + kernel-version matrix + CAP_BPF (egress_e2e)
  #  - security: cargo-audit / cargo-deny (dependency vulns / licenses)
  #  - platform: rig integration on macOS/Windows (no eBPF)
  #  - release: SLSA provenance (at first release)
