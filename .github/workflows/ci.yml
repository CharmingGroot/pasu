name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  # 단계적 추가 (설계: docs/ci.md):
  #  - L3(eBPF): privileged ubuntu 러너 + 커널 버전 매트릭스 + CAP_BPF E2E
  #  - 보안: cargo-audit / cargo-deny (의존성 취약점·라이선스)
  #  - 플랫폼: macOS/Windows에서 L1+L2 (L3 제외)
  #  - 릴리스: SLSA provenance (첫 릴리스 시)
