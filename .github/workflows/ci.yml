name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      # default-members only (pasu-core, pasu-rig). The eBPF stack needs nightly +
      # bpf-linker + a Linux/bpf target, so it is built and E2E-tested on Linux in
      # a separate (privileged) job — see the ci.md plan below.
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test

  ebpf:
    name: eBPF build + unit (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: install bpf-linker
        run: cargo install bpf-linker --locked
      - uses: Swatinem/rust-cache@v2
      # builds the eBPF program (aya-build) and runs control-plane unit tests
      # (EgressLayer, daemon policy lowering); the cgroup E2E runs in the
      # privileged ebpf-e2e job.
      - name: build + unit-test eBPF stack
        run: |
          cargo test -p pasu-egress --lib
          cargo test -p pasu-daemon
          cargo test -p pasu-cli

  ebpf-e2e:
    name: eBPF E2E (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: install bpf-linker
        run: cargo install bpf-linker --locked
      - uses: Swatinem/rust-cache@v2
      - name: build E2E binary
        run: cargo test -p pasu-egress --test egress_e2e --no-run
      # cgroup egress E2E needs root (CAP_BPF + cgroup attach). PASU_E2E_KERNEL
      # opts the test in; without it (and without root) the test self-skips.
      - name: run E2E (privileged cgroup egress)
        run: |
          sudo env "PATH=$PATH" "RUSTUP_HOME=$HOME/.rustup" "CARGO_HOME=$HOME/.cargo" \
            PASU_E2E_KERNEL=1 \
            cargo test -p pasu-egress --test egress_e2e -- --test-threads=1 --nocapture

  # Added incrementally (design: docs/ci.md):
  #  - eBPF kernel-version matrix (5.15 / 6.x / 7.x)
  #  - security: cargo-audit / cargo-deny (dependency vulns / licenses)
  #  - platform: rig integration on macOS/Windows (no eBPF)
  #  - release: SLSA provenance (at first release)
