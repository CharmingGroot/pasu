[workspace]
resolver = "2"
members = [
    "crates/pasu-core",
    "crates/pasu-toolgate",
    # 단계적 추가 (설계: docs/repo-structure.md):
    # "crates/pasu-rules",    # RuleEngine 구현 (Falco 차용)
    # "crates/pasu-egress",   # egress proxy (OSI L7)
    # "crates/pasu-ebpf",     # eBPF (OSI L3/L4, Linux)
    # "crates/pasu-daemon",   # 노드 데몬 (egress + ebpf)
    # "crates/pasu-sdk",      # tool gate 임베드 라이브러리
]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/CharmingGroot/pasu"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
