<svg viewBox="0 0 720 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
<title>pasu Information Architecture (crate map)</title>
<desc>pasu의 협조적(rig) 계층과 강제(eBPF) 계층, rules·ui·audit 구현이 모두 pasu-core의 Event/Verdict 타입과 RuleEngine·Layer·Approver·AuditSink 트레이트를 공유한다는 crate 지도</desc>
<rect width="720" height="580" fill="#ffffff"/>
<defs>
  <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#555555"/></marker>
</defs>

<text x="36" y="33" font-size="19" font-weight="700" fill="#1a1a1a">pasu — Information Architecture (crate 지도)</text>
<text x="36" y="54" font-size="12.5" fill="#555555">두 계층 + 정책·승인·관측 구현이 모두 pasu-core의 타입/트레이트를 공유 — 화살표 = pasu-core 사용(trait 구현)</text>

<rect x="285" y="70" width="150" height="38" rx="8" fill="#ffffff" stroke="#9a9a9a"/>
<text x="360" y="94" font-size="13" font-weight="600" text-anchor="middle" fill="#1a1a1a">AI Agent · rig</text>
<line x1="330" y1="108" x2="210" y2="126" stroke="#555555" marker-end="url(#a)"/>
<line x1="390" y1="108" x2="510" y2="126" stroke="#555555" marker-end="url(#a)"/>

<rect x="36" y="128" width="316" height="106" rx="8" fill="#f4f4f3" stroke="#9a9a9a"/>
<text x="52" y="150" font-size="12.5" font-weight="700" fill="#c2410c">① Cooperative · in-process — pasu-rig</text>
<rect x="50" y="160" width="288" height="30" rx="5" fill="#ffffff" stroke="#dddddd"/>
<text x="60" y="179" font-size="11" fill="#1a1a1a">AgentHook — tool gate + HITL</text>
<rect x="50" y="196" width="288" height="30" rx="5" fill="#ffffff" stroke="#dddddd"/>
<text x="60" y="215" font-size="11" fill="#1a1a1a">HttpClientExt — LLM egress</text>

<rect x="368" y="128" width="316" height="106" rx="8" fill="#f4f4f3" stroke="#9a9a9a"/>
<text x="384" y="150" font-size="12.5" font-weight="700" fill="#c2410c">② Enforcing · kernel — pasu-egress · pasu-ebpf</text>
<rect x="382" y="160" width="288" height="30" rx="5" fill="#ffffff" stroke="#dddddd"/>
<text x="392" y="179" font-size="11" fill="#1a1a1a">pasu-egress — loader / daemon (EgressLayer)</text>
<rect x="382" y="196" width="288" height="30" rx="5" fill="#ffffff" stroke="#dddddd"/>
<text x="392" y="215" font-size="10.5" fill="#1a1a1a">pasu-ebpf — cgroup egress (default-deny · DNS-aware)</text>

<line x1="194" y1="234" x2="285" y2="272" stroke="#555555" marker-end="url(#a)"/>
<line x1="526" y1="234" x2="435" y2="272" stroke="#555555" marker-end="url(#a)"/>

<rect x="180" y="272" width="360" height="94" rx="8" fill="#ffffff" stroke="#9a9a9a" stroke-width="2"/>
<text x="200" y="296" font-size="14" font-weight="700" fill="#c2410c">pasu-core</text>
<text x="200" y="318" font-size="11.5" fill="#1a1a1a">types:  Event · Verdict (allow / deny / ask)</text>
<text x="200" y="340" font-size="10.5" font-family="ui-monospace, monospace" fill="#555555">traits: RuleEngine · Layer · Approver · AuditSink</text>
<text x="200" y="357" font-size="9.5" fill="#8a8a8a">순수(pure) · 다른 crate가 여기에만 의존 (acyclic)</text>

<line x1="300" y1="366" x2="150" y2="400" stroke="#555555" marker-end="url(#a)"/>
<line x1="360" y1="366" x2="360" y2="400" stroke="#555555" marker-end="url(#a)"/>
<line x1="420" y1="366" x2="570" y2="400" stroke="#555555" marker-end="url(#a)"/>

<rect x="36" y="402" width="200" height="70" rx="8" fill="#f4f4f3" stroke="#dddddd"/>
<text x="50" y="423" font-size="12" font-weight="600" fill="#1a1a1a">pasu-rules</text>
<text x="50" y="441" font-size="10.5" fill="#555555">Falco 영감 YAML 룰셋</text>
<text x="50" y="458" font-size="10" font-family="ui-monospace, monospace" fill="#8a8a8a">impl RuleEngine</text>

<rect x="260" y="402" width="200" height="70" rx="8" fill="#f4f4f3" stroke="#dddddd"/>
<text x="274" y="423" font-size="12" font-weight="600" fill="#1a1a1a">pasu-audit</text>
<text x="274" y="441" font-size="10.5" fill="#555555">JSONL · in-memory sink</text>
<text x="274" y="458" font-size="10" font-family="ui-monospace, monospace" fill="#8a8a8a">impl AuditSink</text>

<rect x="484" y="402" width="200" height="70" rx="8" fill="#f4f4f3" stroke="#dddddd"/>
<text x="498" y="423" font-size="12" font-weight="600" fill="#1a1a1a">pasu-ui</text>
<text x="498" y="441" font-size="10.5" fill="#555555">웹: 승인 / · 관측 /audit</text>
<text x="498" y="458" font-size="10" font-family="ui-monospace, monospace" fill="#8a8a8a">impl Approver · AuditSink</text>

<text x="36" y="506" font-size="11" fill="#555555">런타임 흐름:  Layer.check(Event) → RuleEngine.evaluate → Verdict → (Ask → Approver) · AuditSink.record → pasu-ui / JSONL</text>
<text x="36" y="528" font-size="10.5" fill="#8a8a8a">협조적 계층은 우회 가능 → 강제 계층(kernel)이 최후 방어.  eBPF 스택: pasu-egress → pasu-ebpf → pasu-ebpf-common (Linux).</text>
</svg>
