<svg viewBox="0 0 940 400" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>pasu-proxy as a sidecar</title>
<desc>pasu-proxy 사이드카 배치도. 에이전트와 pasu-proxy(무권한)를 한 파드/호스트에 두고 에이전트의 base_url만 localhost 프록시로 바꾼다. 프록시가 provider로 포워딩하며 응답의 tool call을 검사(deny→403, ask→HITL)하고 stderr JSONL로 감사를 남긴다. 같은 노드의 pasu-egress(privileged)가 cgroup egress를 기본 차단해 프록시를 우회한 트래픽을 커널에서 drop — 선택적 심층방어.</desc>

<defs>
  <linearGradient id="skg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3a4254"/><stop offset="1" stop-color="#232836"/></linearGradient>
  <marker id="sab" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3f7ef7"/></marker>
  <marker id="sar" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#e5484d"/></marker>
</defs>

<rect x="0" y="0" width="940" height="400" rx="18" fill="#f7f8fc" stroke="#e6e8f0" stroke-width="1.5"/>
<text x="28" y="38" font-size="19" font-weight="800" fill="#1f2430">pasu-proxy as a sidecar</text>
<text x="28" y="60" font-size="12" fill="#5b6478">One pod (or host): change the agent's base_url — nothing else. The proxy is unprivileged; the kernel guard is optional defense-in-depth.</text>

<!-- pod boundary -->
<rect x="36" y="84" width="560" height="200" rx="14" fill="none" stroke="#c9d0e6" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="52" y="106" font-size="11" fill="#6b7488">agent pod · shared localhost</text>

<!-- agent container -->
<rect x="60" y="126" width="200" height="120" rx="12" fill="#ffffff" stroke="#c9d0e6"/>
<text x="160" y="156" font-size="14" font-weight="700" text-anchor="middle" fill="#1f2430">your agent</text>
<text x="160" y="176" font-size="10" text-anchor="middle" fill="#6b7488">any framework · any language</text>
<rect x="80" y="196" width="160" height="26" rx="7" fill="#eef1f9" stroke="#cdd3e6"/>
<text x="160" y="213" font-size="9.5" font-family="ui-monospace, monospace" text-anchor="middle" fill="#1f2430">base_url = localhost:8788</text>

<!-- proxy container -->
<rect x="340" y="126" width="220" height="120" rx="12" fill="#eef7f4" stroke="#0d9488"/>
<text x="450" y="154" font-size="14" font-weight="700" text-anchor="middle" fill="#0f766e">pasu-proxy</text>
<text x="450" y="172" font-size="10" text-anchor="middle" fill="#0f766e">sidecar · unprivileged</text>
<text x="450" y="196" font-size="9.5" text-anchor="middle" fill="#1f2430">parses tool calls in responses</text>
<text x="450" y="212" font-size="9.5" text-anchor="middle" fill="#1f2430">deny → 403 · ask → HITL (--ui)</text>
<text x="450" y="228" font-size="9.5" text-anchor="middle" fill="#6b7488">audit → stderr JSONL</text>

<line x1="260" y1="186" x2="336" y2="186" stroke="#3f7ef7" stroke-width="2.5" marker-end="url(#sab)"/>

<!-- provider -->
<rect x="700" y="136" width="196" height="100" rx="12" fill="#ffffff" stroke="#c9d0e6"/>
<text x="798" y="180" font-size="13" font-weight="700" text-anchor="middle" fill="#1f2430">LLM provider</text>
<text x="798" y="200" font-size="10" text-anchor="middle" fill="#6b7488">internal vLLM · OpenAI-compatible</text>
<text x="798" y="216" font-size="10" text-anchor="middle" fill="#6b7488">Anthropic · Gemini</text>

<line x1="560" y1="176" x2="696" y2="176" stroke="#3f7ef7" stroke-width="2.5" marker-end="url(#sab)"/>
<text x="628" y="166" font-size="9.5" text-anchor="middle" fill="#2f6fe0">forward · inspect response</text>

<!-- node line + kernel guard -->
<line x1="36" y1="308" x2="904" y2="308" stroke="#cdd3e6" stroke-width="1.5" stroke-dasharray="2 4"/>
<text x="36" y="300" font-size="10" fill="#8a92a6">node (Linux)</text>

<rect x="60" y="322" width="500" height="52" rx="10" fill="url(#skg)"/>
<text x="80" y="344" font-size="12" font-weight="700" fill="#e6e8f0">pasu-egress — kernel cgroup egress · default-deny</text>
<text x="80" y="362" font-size="9.5" fill="#c7cdda">privileged (CAP_BPF) · optional defense-in-depth: traffic that bypasses the proxy is dropped here</text>

<!-- bypass arrow: agent direct socket dropped at kernel -->
<path d="M120 246 C120 290 140 300 150 318" fill="none" stroke="#e5484d" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#sar)"/>
<circle cx="152" cy="322" r="9" fill="#e5484d"/><path d="M148 318 l8 8 M156 318 l-8 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
<text x="168" y="300" font-size="9.5" fill="#c0333a">direct socket (bypasses proxy) → dropped</text>

<text x="620" y="344" font-size="10.5" fill="#5b6478">deploy/proxy/Dockerfile · k8s-sidecar.yaml</text>
<text x="620" y="360" font-size="10.5" fill="#5b6478">one policy YAML shared by both layers</text>
</svg>
