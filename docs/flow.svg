<svg viewBox="0 0 940 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img">
<title>pasu — two-layer egress defense</title>
<desc>AI 에이전트의 egress를 rig 훅(협조)과 eBPF 커널(enforcing) 두 계층이 하나의 정책으로 통제. 훅을 우회한 rogue egress도 커널이 drop.</desc>

<defs>
  <linearGradient id="kgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3a4254"/><stop offset="1" stop-color="#232836"/></linearGradient>
  <marker id="ah_blue" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3f7ef7"/></marker>
</defs>

<rect x="0" y="0" width="940" height="520" rx="18" fill="#f7f8fc" stroke="#e6e8f0" stroke-width="1.5"/>

<text x="28" y="40" font-size="19" font-weight="800" fill="#1f2430">pasu — two layers, one policy</text>
<text x="28" y="62" font-size="12.5" fill="#5b6478">An in-process hook sees only what the agent <tspan font-style="italic">declares</tspan>; the kernel sees everything.</text>

<rect x="330" y="78" width="330" height="40" rx="10" fill="#ffffff" stroke="#c9d0e6"/>
<rect x="330" y="78" width="6" height="40" rx="3" fill="#403aa8"/>
<text x="349" y="103" font-size="13" font-weight="600" fill="#1f2430">Policy · one YAML ruleset  (allow / ask / deny)</text>

<text x="358" y="146" font-size="12.5" font-weight="700" text-anchor="middle" fill="#3a3f52">① rig hook</text>
<text x="358" y="160" font-size="10.5" text-anchor="middle" fill="#6b7488">cooperative · in-process</text>
<text x="544" y="146" font-size="12.5" font-weight="700" text-anchor="middle" fill="#3a3f52">② eBPF kernel</text>
<text x="544" y="160" font-size="10.5" text-anchor="middle" fill="#6b7488">enforcing · cgroup</text>

<rect x="40" y="170" width="452" height="282" rx="14" fill="#eef1f9" stroke="#cdd3e6"/>
<text x="56" y="190" font-size="11" fill="#6b7488">agent process · cgroup</text>

<rect x="64" y="226" width="150" height="150" rx="12" fill="#ffffff" stroke="#c9d0e6"/>
<text x="139" y="290" font-size="15" font-weight="700" text-anchor="middle" fill="#1f2430">AI agent</text>
<text x="139" y="310" font-size="10.5" text-anchor="middle" fill="#6b7488">tool calls · egress</text>
<circle cx="214" cy="258" r="4" fill="#3f7ef7"/><circle cx="214" cy="300" r="4" fill="#efa93b"/><circle cx="214" cy="342" r="4" fill="#e5484d"/>

<g fill="#5f6f92"><rect x="350" y="178" width="16" height="72" rx="4"/><rect x="350" y="266" width="16" height="68" rx="4"/><rect x="350" y="350" width="16" height="100" rx="4"/></g>

<rect x="510" y="178" width="68" height="72" rx="8" fill="url(#kgrad)"/>
<rect x="510" y="266" width="68" height="184" rx="8" fill="url(#kgrad)"/>
<text x="544" y="360" font-size="10.5" fill="#e6e8f0" opacity="0.9" text-anchor="middle" transform="rotate(-90 544 360)">cgroup egress</text>

<rect x="700" y="226" width="180" height="150" rx="12" fill="#ffffff" stroke="#c9d0e6"/>
<text x="790" y="296" font-size="14" font-weight="700" text-anchor="middle" fill="#1f2430">Internet</text>
<text x="790" y="316" font-size="10.5" text-anchor="middle" fill="#6b7488">only allowed egress arrives</text>

<line x1="214" y1="258" x2="694" y2="258" stroke="#3f7ef7" stroke-width="5" marker-end="url(#ah_blue)"/>
<circle cx="358" cy="258" r="8" fill="#2fb27a"/><path d="M354 258 l3 3 5 -6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="544" cy="258" r="8" fill="#2fb27a"/><path d="M540 258 l3 3 5 -6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="224" y="248" font-size="10" fill="#2f6fe0">declared · allowed</text>

<line x1="214" y1="300" x2="346" y2="300" stroke="#efa93b" stroke-width="5" stroke-linecap="round"/>
<circle cx="358" cy="300" r="9" fill="#efa93b"/><rect x="354.5" y="295.5" width="2.4" height="9" rx="1" fill="#fff"/><rect x="359" y="295.5" width="2.4" height="9" rx="1" fill="#fff"/>
<text x="224" y="290" font-size="10" fill="#a9711b">declared · needs approval / deny</text>

<line x1="214" y1="342" x2="506" y2="342" stroke="#e5484d" stroke-width="4" stroke-dasharray="7 5"/>
<text x="224" y="332" font-size="10" fill="#c0333a">rogue egress · own socket → bypasses hook</text>
<circle cx="520" cy="342" r="11" fill="#e5484d"/><path d="M515 337 l10 10 M525 337 l-10 10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
<text x="520" y="372" font-size="10.5" font-weight="700" text-anchor="middle" fill="#c0333a">dropped by the kernel</text>

<g stroke="#403aa8" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.5" fill="none">
  <path d="M430 118 C420 150 380 150 358 176"/>
  <path d="M540 118 C548 148 544 150 544 176"/>
</g>

<rect x="330" y="470" width="330" height="38" rx="10" fill="#ffffff" stroke="#c9d0e6"/>
<rect x="330" y="470" width="6" height="38" rx="3" fill="#5f6f92"/>
<text x="349" y="494" font-size="13" font-weight="600" fill="#1f2430">Audit · JSONL  (every decision, both layers)</text>
<g stroke="#8a92a6" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.7" fill="none">
  <path d="M358 450 C360 462 420 462 430 470"/>
  <path d="M544 450 C544 462 530 464 520 470"/>
</g>

<rect x="678" y="470" width="234" height="38" rx="10" fill="#eef1f9" stroke="#cdd3e6"/>
<text x="795" y="488" font-size="11" font-weight="700" text-anchor="middle" fill="#1f2430">enforcing &gt; cooperative</text>
<text x="795" y="502" font-size="9.5" text-anchor="middle" fill="#5b6478">skip the hook, the kernel still drops it</text>
</svg>
